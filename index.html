<!DOCTYPE html>
<html>
<body>
<h1>CORS Test - Trip.com API</h1>
<pre id="result"></pre>
<script>
// ===== استخدام Proxy وسيط =====
const PROXY_URL = "https://cors-anywhere.herokuapp.com/";
const TARGET_URL = "https://www.trip.com/restapi/soa2/24884/json/getConfiguration?x-traceID=";

// ===== البيانات المطابقة للطلب الأصلي =====
const tripData = {
  head: {
    locale: "ar-XX",
    currency: "USD",
    vID: "1783978788105.8e68P1hvGdSY"
  },
  platform: "Online",
  componentType: "online-app-download-universal",
  version: "6.0.5",
  pageId: "10320668150",
  aid: 0,
  sid: 0,
  customId: "adBanner",
  customParam: {}
};

// ===== إرسال الطلب عبر Proxy =====
fetch(PROXY_URL + TARGET_URL, {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
    // نحذف الـ Cookie من الـ headers
  },
  // نغير credentials لـ 'omit' عشان ما نرسل Cookies
  credentials: 'omit',
  body: JSON.stringify(tripData)
})
.then(r => {
  if (!r.ok) {
    throw new Error(`HTTP error! status: ${r.status} - ${r.statusText}`);
  }
  return r.text();
})
.then(responseText => {
  // عرض الرد كامل
  document.getElementById("result").textContent = "✅ Status: 200 OK\n\n" + responseText;
  
  // محاولة استخراج الإيميل
  try {
    const jsonResponse = JSON.parse(responseText);
    console.log("📦 الرد الكامل:", jsonResponse);
    
    // استخراج الإيميل
    if (jsonResponse.email) {
      console.log("📧 الإيميل موجود:", jsonResponse.email);
      document.getElementById("result").textContent += "\n\n📧 الإيميل: " + jsonResponse.email;
    } else {
      console.log("⚠️ الإيميل غير موجود في الرد");
    }
    
    // استخراج معلومات إضافية
    if (jsonResponse.ResponseStatus) {
      console.log("📊 الحالة:", jsonResponse.ResponseStatus.Ack);
    }
    
  } catch(e) {
    console.log("⚠️ الرد ليس JSON صالح");
    console.log("الرد النصي:", responseText);
  }
})
.catch(e => {
  document.getElementById("result").textContent = "❌ خطأ:\n" + e.message;
  console.error("❌ تفاصيل الخطأ:", e);
});
</script>
</body>
</html>
